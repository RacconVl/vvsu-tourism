openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API for VVSU Tourism & Creative Industries immersive educational platform
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: courses
    description: Course and module operations
  - name: quests
    description: Quest and task operations
  - name: achievements
    description: Achievements and badges
  - name: map
    description: Interactive Vladivostok map points
  - name: community
    description: Forum and student works
  - name: library
    description: Educational resources
  - name: dashboard
    description: Student dashboard and progress
  - name: quizzes
    description: Interactive knowledge quizzes about Vladivostok and Primorsky Krai
  - name: auth
    description: Authentication and session management
  - name: profile
    description: Personal profile and statistics
  - name: admin
    description: Admin-only operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /courses:
    get:
      operationId: listCourses
      tags: [courses]
      summary: List all courses
      responses:
        "200":
          description: List of courses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Course"

  /courses/{id}:
    get:
      operationId: getCourse
      tags: [courses]
      summary: Get course with modules
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Course detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseDetail"

  /modules/{id}/complete:
    post:
      operationId: completeModule
      tags: [courses]
      summary: Mark a module as complete
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Module completion result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModuleCompletion"

  /quests:
    get:
      operationId: listQuests
      tags: [quests]
      summary: List all quests
      responses:
        "200":
          description: List of quests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Quest"

  /quests/{id}:
    get:
      operationId: getQuest
      tags: [quests]
      summary: Get quest detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Quest detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quest"

  /quests/{id}/submit:
    post:
      operationId: submitQuest
      tags: [quests]
      summary: Submit quest answer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuestSubmission"
      responses:
        "200":
          description: Submission result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuestResult"

  /achievements:
    get:
      operationId: listAchievements
      tags: [achievements]
      summary: List all achievements with unlock status
      responses:
        "200":
          description: Achievements list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Achievement"

  /map/points:
    get:
      operationId: listMapPoints
      tags: [map]
      summary: List all interactive map points
      responses:
        "200":
          description: Map points
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MapPoint"

  /map/routes:
    get:
      operationId: listMapRoutes
      tags: [map]
      summary: List tourist routes
      responses:
        "200":
          description: Tourist routes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TouristRoute"

  /community/posts:
    get:
      operationId: listCommunityPosts
      tags: [community]
      summary: List community forum posts
      responses:
        "200":
          description: Community posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CommunityPost"
    post:
      operationId: createCommunityPost
      tags: [community]
      summary: Create a community post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCommunityPostBody"
      responses:
        "201":
          description: Created post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityPost"

  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List my notifications (latest 50)
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /notifications/read-all:
    patch:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all my notifications as read
      responses:
        "204":
          description: Done

  /notifications/{id}/read:
    patch:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark one notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Done

  /notifications/admin:
    post:
      operationId: adminCreateNotification
      tags: [notifications]
      summary: Admin — create and broadcast notification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNotificationBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                required: [count]

  /auth/heartbeat:
    patch:
      operationId: heartbeat
      tags: [auth]
      summary: Update last seen timestamp
      responses:
        "204":
          description: OK

  /friends:
    get:
      operationId: listFriends
      tags: [friends]
      summary: List my accepted friends with online status
      responses:
        "200":
          description: Friends list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FriendUser"

  /friends/requests:
    get:
      operationId: listFriendRequests
      tags: [friends]
      summary: List pending incoming friend requests
      responses:
        "200":
          description: Pending requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FriendRequest"

  /friends/status/{userId}:
    get:
      operationId: getFriendStatus
      tags: [friends]
      summary: Get friendship and online status with a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FriendStatus"

  /friends/{userId}:
    post:
      operationId: addFriend
      tags: [friends]
      summary: Send a friend request
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Request sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FriendStatus"
    delete:
      operationId: removeFriend
      tags: [friends]
      summary: Remove friend or cancel/decline request
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed

  /friends/{userId}/accept:
    patch:
      operationId: acceptFriend
      tags: [friends]
      summary: Accept a friend request
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Accepted

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users (for messaging)
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MessageUser"

  /messages/conversations:
    get:
      operationId: listConversations
      tags: [messages]
      summary: List conversations for current user
      responses:
        "200":
          description: Conversations list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conversation"

  /messages/{userId}:
    get:
      operationId: getMessages
      tags: [messages]
      summary: Get messages with a specific user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Messages list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DirectMessage"
    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send a message to a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageBody"
      responses:
        "201":
          description: Sent message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DirectMessage"

  /messages/{userId}/read:
    patch:
      operationId: markMessagesRead
      tags: [messages]
      summary: Mark all messages from a user as read
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Marked as read

  /community/posts/{id}/comments:
    get:
      operationId: listPostComments
      tags: [community]
      summary: List comments for a post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PostComment"
    post:
      operationId: createPostComment
      tags: [community]
      summary: Add a comment to a post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePostCommentBody"
      responses:
        "201":
          description: Created comment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostComment"

  /community/gallery:
    get:
      operationId: listGalleryWorks
      tags: [community]
      summary: List student gallery works
      responses:
        "200":
          description: Gallery works
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GalleryWork"

  /library/resources:
    get:
      operationId: listLibraryResources
      tags: [library]
      summary: List educational library resources
      responses:
        "200":
          description: Library resources
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LibraryResource"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get student dashboard summary
      responses:
        "200":
          description: Dashboard summary with progress and stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/progress:
    get:
      operationId: getProgressMap
      tags: [dashboard]
      summary: Get travel map progress visualization data
      responses:
        "200":
          description: Progress map data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProgressMap"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "200":
          description: Registered user with JWT token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthWithToken"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Sign in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Logged in user with JWT token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthWithToken"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Sign out
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user or null
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"

  /profile:
    get:
      operationId: getMyProfile
      tags: [profile]
      summary: Get my full profile with stats
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
    patch:
      operationId: updateMyProfile
      tags: [profile]
      summary: Update my profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"

  /profile/{id}:
    get:
      operationId: getPublicProfile
      tags: [profile]
      summary: Get public profile of a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Public profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicProfile"

  /admin/users:
    get:
      operationId: adminListUsers
      tags: [admin]
      summary: List all users (admin only)
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUserRow"

  /admin/stats:
    get:
      operationId: adminGetStats
      tags: [admin]
      summary: Aggregate platform statistics
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/courses:
    post:
      operationId: adminCreateCourse
      tags: [admin]
      summary: Create a new course
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCourseRequest"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"

  /admin/quests:
    post:
      operationId: adminCreateQuest
      tags: [admin]
      summary: Create a new quest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQuestRequest"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quest"

  /admin/quizzes:
    post:
      operationId: adminCreateQuiz
      tags: [admin]
      summary: Create a new quiz with questions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminCreateQuizBody"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminCreateQuizResponse"

  /admin/courses/{id}:
    put:
      operationId: adminUpdateCourse
      tags: [admin]
      summary: Update a course
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCourseRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"
    delete:
      operationId: adminDeleteCourse
      tags: [admin]
      summary: Delete a course
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDeleteResponse"

  /admin/courses/{id}/modules:
    post:
      operationId: adminAddModule
      tags: [admin]
      summary: Add a module to a course
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminCreateModuleBody"
      responses:
        "200":
          description: Module created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Module"

  /admin/modules/{id}:
    delete:
      operationId: adminDeleteModule
      tags: [admin]
      summary: Delete a module
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDeleteResponse"

  /admin/quests/{id}:
    put:
      operationId: adminUpdateQuest
      tags: [admin]
      summary: Update a quest
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQuestRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quest"
    delete:
      operationId: adminDeleteQuest
      tags: [admin]
      summary: Delete a quest
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDeleteResponse"

  /admin/quizzes/{id}:
    put:
      operationId: adminUpdateQuiz
      tags: [admin]
      summary: Update a quiz
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminCreateQuizBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminCreateQuizResponse"
    delete:
      operationId: adminDeleteQuiz
      tags: [admin]
      summary: Delete a quiz
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDeleteResponse"

  /quizzes:
    get:
      operationId: listQuizzes
      tags: [quizzes]
      summary: List all quizzes
      responses:
        "200":
          description: List of quizzes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QuizSummary"

  /quizzes/{id}:
    get:
      operationId: getQuiz
      tags: [quizzes]
      summary: Get full quiz with questions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Quiz with questions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quiz"

  /quizzes/{id}/submit:
    post:
      operationId: submitQuiz
      tags: [quizzes]
      summary: Submit quiz answers and get results
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuizSubmission"
      responses:
        "200":
          description: Quiz result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuizResult"

  /dashboard/leaderboard:
    get:
      operationId: getLeaderboard
      tags: [dashboard]
      summary: Get top students leaderboard
      responses:
        "200":
          description: Leaderboard
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaderboardEntry"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Course:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        role:
          type: string
          description: "Student role: guide, marketer, designer, operator"
        stage:
          type: string
          description: "Journey stage name (e.g. Порт отправления)"
        imageUrl:
          type: string
          nullable: true
        totalModules:
          type: integer
        completedModules:
          type: integer
        xpReward:
          type: integer
        isLocked:
          type: boolean
        category:
          type: string
      required: [id, title, description, role, stage, totalModules, completedModules, xpReward, isLocked, category]

    Module:
      type: object
      properties:
        id:
          type: integer
        courseId:
          type: integer
        title:
          type: string
        type:
          type: string
          description: "video, interactive, animation, test"
        order:
          type: integer
        isCompleted:
          type: boolean
        durationMinutes:
          type: integer
        xpReward:
          type: integer
      required: [id, courseId, title, type, order, isCompleted, durationMinutes, xpReward]

    CourseDetail:
      allOf:
        - $ref: "#/components/schemas/Course"
        - type: object
          properties:
            modules:
              type: array
              items:
                $ref: "#/components/schemas/Module"
          required: [modules]

    ModuleCompletion:
      type: object
      properties:
        success:
          type: boolean
        xpEarned:
          type: integer
        newAchievements:
          type: array
          items:
            $ref: "#/components/schemas/Achievement"
      required: [success, xpEarned, newAchievements]

    Quest:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        type:
          type: string
          description: "route, budget, marketing, design"
        difficulty:
          type: string
          description: "easy, medium, hard"
        xpReward:
          type: integer
        isCompleted:
          type: boolean
        imageUrl:
          type: string
          nullable: true
        locationName:
          type: string
      required: [id, title, description, type, difficulty, xpReward, isCompleted, locationName]

    QuestSubmission:
      type: object
      properties:
        answer:
          type: string
      required: [answer]

    QuestResult:
      type: object
      properties:
        success:
          type: boolean
        xpEarned:
          type: integer
        feedback:
          type: string
        newAchievements:
          type: array
          items:
            $ref: "#/components/schemas/Achievement"
      required: [success, xpEarned, feedback, newAchievements]

    Achievement:
